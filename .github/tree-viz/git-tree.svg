<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1200" height="800" 
     viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="leafGradient">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="mergeGradient">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="forkGradient">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="tagGradient">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.8" />
    </radialGradient>
    <style>
      .branch-line { stroke: #64748b; stroke-width: 2; fill: none; opacity: 0.7; }
      .trunk-line { stroke: #22c55e; stroke-width: 2.5; fill: none; opacity: 0.6; }
      .commit-leaf { cursor: pointer; }
      .commit-leaf:hover { filter: brightness(1.5); }
      .branch-label { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #0f172a; }
    </style>
  </defs>
  
  <rect width="1200" height="800" fill="#f8fafc"/>
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Branch connection lines -->
  <g id="branches">
    <line class="trunk-line" x1="600" y1="60" x2="600" y2="180"/>
    <path class="branch-line" d="M 600 60 C 600 76, 720 84, 720 100"/>
    <path class="branch-line" d="M 720 100 C 720 132, 600 148, 600 180"/>
    <line class="trunk-line" x1="600" y1="180" x2="600" y2="220"/>
    <line class="trunk-line" x1="600" y1="220" x2="600" y2="260"/>
    <line class="trunk-line" x1="600" y1="260" x2="600" y2="300"/>
    <line class="trunk-line" x1="600" y1="300" x2="600" y2="340"/>
    <line class="trunk-line" x1="600" y1="340" x2="600" y2="380"/>
    <line class="trunk-line" x1="600" y1="380" x2="600" y2="420"/>
    <line class="trunk-line" x1="600" y1="420" x2="600" y2="460"/>
    <line class="trunk-line" x1="600" y1="460" x2="600" y2="500"/>
    <line class="trunk-line" x1="600" y1="500" x2="600" y2="540"/>
    <line class="trunk-line" x1="600" y1="540" x2="600" y2="580"/>
    <line class="trunk-line" x1="600" y1="580" x2="600" y2="620"/>
    <line class="trunk-line" x1="600" y1="620" x2="600" y2="660"/>
  </g>
  <!-- Commit nodes -->
  <g id="commits">
    <circle class="commit-leaf" cx="600" cy="60" r="10" fill="url(#mergeGradient)" stroke="#7c3aed" stroke-width="1.5"><title>838b9c4: Merge pull request #1 from XAOSTECH/anglicise/20260401-002733</title></circle>
    <circle class="commit-leaf" cx="720" cy="100" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>6b90c0c: chore: convert American spellings to British English</title></circle>
    <circle class="commit-leaf" cx="600" cy="180" r="9" fill="url(#forkGradient)" stroke="#ea580c" stroke-width="1.5"><title>56414f6: chore: update CHANGELOG for v0.1.1 (re-release)</title></circle>
    <circle class="commit-leaf" cx="600" cy="220" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>7a60e2a: chore(dc-init): load workflows,actions</title></circle>
    <circle class="commit-leaf" cx="600" cy="260" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>6c844c9: chore(dc-init): load workflows,actions</title></circle>
    <circle class="commit-leaf" cx="600" cy="300" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>9e895c3: chore(dc-init): update workflows,actions</title></circle>
    <circle class="commit-leaf" cx="600" cy="340" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>ba2a231: chore(dc-init): recover interrupted update</title></circle>
    <circle class="commit-leaf" cx="600" cy="380" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>d9474fe: refactor: modularise into lib/ directory</title></circle>
    <circle class="commit-leaf" cx="600" cy="420" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>5f04186: chore: clean up docs</title></circle>
    <circle class="commit-leaf" cx="600" cy="460" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>7c5f6f6: chore: update CHANGELOG for v0.1.1</title></circle>
    <circle class="commit-leaf" cx="600" cy="500" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>730899f: Add managed prefix info and external EXE launcher command</title></circle>
    <circle class="commit-leaf" cx="600" cy="540" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>ff3d29b: security: add global and command route rate limiting</title></circle>
    <circle class="commit-leaf" cx="600" cy="580" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>b6ce59b: chore(dc-init): update workflows and actions</title></circle>
    <circle class="commit-leaf" cx="600" cy="620" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>d3a6357: gc-init</title></circle>
    <circle class="commit-leaf" cx="600" cy="660" r="6" fill="url(#tagGradient)" stroke="#0284c7" stroke-width="1.5"><title>4854ca9: Init</title></circle>
  </g>
  
  <!-- Legend -->
  <g id="legend" transform="translate(20, 20)">
    <rect width="200" height="110" fill="white" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <circle cx="20" cy="25" r="5" fill="url(#leafGradient)" stroke="#16a34a"/>
    <text x="32" y="30" class="branch-label" font-size="12">Regular Commit</text>
    <circle cx="20" cy="50" r="6" fill="url(#mergeGradient)" stroke="#7c3aed"/>
    <text x="32" y="55" class="branch-label" font-size="12">Merge Commit</text>
    <circle cx="20" cy="75" r="6" fill="url(#forkGradient)" stroke="#ea580c"/>
    <text x="32" y="80" class="branch-label" font-size="12">Fork Point</text>
    <circle cx="20" cy="100" r="6" fill="url(#tagGradient)" stroke="#0284c7"/>
    <text x="32" y="105" class="branch-label" font-size="12">Tagged</text>
  </g>
  
  <!-- Repository info -->
  <g id="info" transform="translate(20, 760)">
    <text x="0" y="0" class="branch-label" font-size="12" fill="#666">
      Repository: wine-gaming
    </text>
    <text x="0" y="20" class="branch-label" font-size="10" fill="#999">
      Generated: 2026-04-06 01:57:12 UTC
    </text>
  </g>
</svg>
